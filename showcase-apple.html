<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>苹果融合风样板预览 · 我的食谱</title>
<style>
  :root {
    /* 苹果排版 + 美食暖色（融合）*/
    --bg: #f5f5f7;          /* 苹果标志浅灰 */
    --bg-white: #ffffff;    /* 纯白分区 */
    --card: #ffffff;
    --text: #1d1d1f;        /* 苹果近黑正文 */
    --text-soft: #6e6e73;   /* 苹果次要灰 */
    --muted: #a1a1a6;       /* 更弱说明 */
    --line: #e8e8ed;        /* 极淡分割 */
    --brand: #e8543f;       /* 番茄红暖点缀 */
    --brand-hover: #d64530;
    --brand-soft: #fcebe7;
    --leaf: #5b8c3e;
    --leaf-soft: #eef4e8;
    --gold: #b8791f;
    --gold-soft: #f7efe0;
    --link: #0071e3;        /* 苹果蓝，仅链接 */
    /* 极淡阴影，苹果几乎不用重阴影 */
    --shadow-sm: 0 4px 16px rgba(0, 0, 0, 0.05);
    --shadow: 0 12px 36px rgba(0, 0, 0, 0.08);
    --radius: 18px;
    --radius-lg: 28px;
    --radius-sm: 12px;
    /* 苹果式缓动 */
    --ease: cubic-bezier(0.28, 0.11, 0.32, 1);
    --sans: -apple-system, BlinkMacSystemFont, "SF Pro SC", "SF Pro Text",
            "PingFang SC", "Helvetica Neue", "Microsoft YaHei", system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: var(--sans);
    color: var(--text);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    line-height: 1.5;
  }

  /* ===== 苹果式滚动进场动画 ===== */
  /* 元素进入视口时从下方淡入上移，用苹果标志性长缓动 */
  [data-reveal] {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.9s var(--ease), transform 0.9s var(--ease);
    will-change: opacity, transform;
  }
  [data-reveal].revealed {
    opacity: 1;
    transform: none;
  }
  /* hero 分层：kicker/标题/副标题/按钮依次错开 */
  [data-reveal].d1 { transition-delay: 0.05s; }
  [data-reveal].d2 { transition-delay: 0.15s; }
  [data-reveal].d3 { transition-delay: 0.25s; }
  [data-reveal].d4 { transition-delay: 0.35s; }

  /* hero 视差层：滚动时 JS 驱动位移淡出 */
  .hero-inner { will-change: transform, opacity; }

  @media (prefers-reduced-motion: reduce) {
    [data-reveal] { opacity: 1; transform: none; transition: none; }
    .hero-inner { transform: none !important; opacity: 1 !important; }
  }

  /* ===== 顶部导航（苹果细长半透明条）===== */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 clamp(20px, 5vw, 64px);
    height: 52px;
    background: rgba(245, 245, 247, 0.72);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid var(--line);
  }
  .brand-mark {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .brand-mark .dot { color: var(--brand); }

  /* ===== HERO：苹果超大居中标题 + 大留白 ===== */
  .hero {
    padding: clamp(64px, 12vw, 140px) clamp(20px, 5vw, 64px) clamp(48px, 8vw, 96px);
    max-width: 1000px;
    margin: 0 auto;
    text-align: center;
  }
  .hero-kicker {
    font-size: clamp(19px, 2.4vw, 24px);
    font-weight: 600;
    color: var(--brand);
    margin-bottom: 10px;
    letter-spacing: -0.01em;
  }
  .hero h1 {
    font-size: clamp(40px, 8vw, 88px);
    line-height: 1.05;
    font-weight: 700;
    letter-spacing: -0.03em;   /* 苹果标题紧字距 */
    color: var(--text);
  }
  .hero p {
    max-width: 600px;
    margin: 22px auto 0;
    font-size: clamp(17px, 2.2vw, 22px);
    line-height: 1.45;
    color: var(--text-soft);
    letter-spacing: -0.01em;
  }
  .hero-actions {
    margin-top: 34px;
    display: flex;
    gap: 20px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
  }
  /* 苹果式文字链接（带箭头）*/
  .text-link {
    color: var(--link);
    font-size: clamp(16px, 2vw, 19px);
    font-weight: 400;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 3px;
  }
  .text-link:hover { text-decoration: underline; }
  .text-link::after { content: "›"; font-size: 1.3em; line-height: 0; }

  /* ===== 按钮：苹果胶囊，纯色克制 ===== */
  .btn {
    font-family: var(--sans);
    font-size: 16px;
    font-weight: 500;
    padding: 12px 26px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    letter-spacing: -0.01em;
    transition: transform 0.2s var(--ease), background 0.2s, opacity 0.2s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--brand); color: #fff; }
  .btn-primary:hover { background: var(--brand-hover); }
  .btn-dark { background: var(--text); color: #fff; }
  .btn-dark:hover { opacity: 0.85; }

  /* ===== 分区 ===== */
  .section {
    padding: clamp(56px, 9vw, 120px) clamp(20px, 5vw, 64px);
  }
  .section.on-white { background: var(--bg-white); }
  .section-inner { max-width: 1120px; margin: 0 auto; }
  .section-head { text-align: center; margin-bottom: clamp(32px, 5vw, 56px); }
  .section-head h2 {
    font-size: clamp(30px, 5vw, 52px);
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .section-head p {
    color: var(--text-soft);
    margin-top: 12px;
    font-size: clamp(16px, 2vw, 20px);
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
    letter-spacing: -0.01em;
  }

  /* ===== 世界大类 tabs（苹果分段控件感）===== */
  .tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: clamp(32px, 5vw, 52px);
  }
  .tab {
    padding: 9px 20px;
    border-radius: 999px;
    background: transparent;
    color: var(--text-soft);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: -0.01em;
    transition: all 0.22s var(--ease);
  }
  .tab:hover { color: var(--text); background: rgba(0,0,0,0.04); }
  .tab.active { background: var(--text); color: #fff; }

  /* ===== 卡片：无边框、极淡影、大圆角 ===== */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 28px;
  }
  .card {
    background: var(--card);
    border-radius: var(--radius-lg);
    overflow: hidden;
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: transform 0.3s var(--ease), box-shadow 0.3s var(--ease);
  }
  .card:hover { transform: translateY(-6px); box-shadow: var(--shadow); }
  .card-img {
    position: relative;
    aspect-ratio: 3 / 2;
    overflow: hidden;
    background: var(--bg);
  }
  .card-img i {
    display: block; width: 100%; height: 100%;
    background-size: cover; background-position: center;
    transition: transform 0.6s var(--ease);
  }
  .card:hover .card-img i { transform: scale(1.06); }
  .card-badge {
    position: absolute; top: 14px; left: 14px;
    padding: 6px 13px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.82);
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    color: var(--text);
    font-size: 12px; font-weight: 600;
    letter-spacing: -0.01em;
  }
  .card-body { padding: 22px 22px 24px; }
  .card-title {
    font-size: 22px; font-weight: 600;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  .card-desc {
    font-size: 15px; color: var(--text-soft);
    letter-spacing: -0.01em;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden; margin-bottom: 16px; min-height: 45px;
  }
  .card-meta { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    font-size: 12.5px; padding: 5px 12px; border-radius: 8px;
    background: var(--gold-soft); color: var(--gold); font-weight: 600;
    letter-spacing: -0.01em;
  }
  .chip.leaf { background: var(--leaf-soft); color: var(--leaf); }

  /* ===== 全屏详情 ===== */
  .modal {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg); overflow-y: auto;
    opacity: 0; visibility: hidden;
    transition: opacity 0.4s var(--ease), visibility 0.4s;
  }
  .modal.open { opacity: 1; visibility: visible; }
  .modal-bar {
    position: sticky; top: 0; z-index: 3;
    padding: 12px clamp(18px, 5vw, 48px);
    background: rgba(245, 245, 247, 0.72);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid var(--line);
  }
  .back-btn {
    padding: 8px 18px; border-radius: 999px;
    background: rgba(0,0,0,0.05); border: none;
    color: var(--text); font-size: 14px; font-weight: 500;
    cursor: pointer; font-family: var(--sans); letter-spacing: -0.01em;
  }
  .back-btn:hover { background: rgba(0,0,0,0.09); }
  .modal-hero { height: clamp(240px, 44vw, 480px); background: var(--bg); overflow: hidden; }
  .modal-hero i { display: block; width: 100%; height: 100%; background-size: cover; background-position: center; }
  .modal-content { max-width: 720px; margin: 0 auto; padding: clamp(32px, 6vw, 64px) clamp(20px, 5vw, 32px) 90px; }
  .modal-content h1 {
    font-size: clamp(34px, 6vw, 60px); font-weight: 700; letter-spacing: -0.03em;
    text-align: center;
  }
  .modal-content .lead {
    color: var(--text-soft); font-size: clamp(17px, 2.2vw, 21px);
    margin: 14px auto 0; text-align: center; max-width: 560px; letter-spacing: -0.01em;
  }
  .meta-row {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 12px; margin: 40px 0;
  }
  .meta-box {
    background: #fff; border-radius: var(--radius-sm); padding: 18px 14px; text-align: center;
    box-shadow: var(--shadow-sm);
  }
  .meta-box span { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .meta-box strong { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
  .block-title {
    font-size: 26px; font-weight: 700; letter-spacing: -0.02em;
    margin: 40px 0 18px; text-align: center;
  }
  .ing-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 10px; }
  .ing-item {
    display: flex; justify-content: space-between;
    padding: 14px 18px; background: #fff; border-radius: 12px; font-size: 15px;
    box-shadow: var(--shadow-sm); letter-spacing: -0.01em;
  }
  .ing-item .amt { color: var(--muted); }
  .steps { display: flex; flex-direction: column; gap: 14px; }
  .step {
    display: flex; gap: 16px; padding: 20px 22px;
    background: #fff; border-radius: var(--radius); box-shadow: var(--shadow-sm);
    opacity: 0; transform: translateY(14px);
    transition: opacity 0.5s var(--ease), transform 0.5s var(--ease);
  }
  .step.in { opacity: 1; transform: none; }
  .step .num {
    flex: none; width: 30px; height: 30px; border-radius: 50%;
    background: var(--brand); color: #fff; font-size: 15px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
  }
  .step p { margin: 3px 0 0; color: var(--text); letter-spacing: -0.01em; }

  /* ===== 对照说明 ===== */
  .compare-note { max-width: 1120px; margin: 0 auto; padding: 20px clamp(20px, 5vw, 64px) 0; }
  .compare-note .box {
    background: var(--brand-soft); border-radius: var(--radius-sm);
    padding: 16px 20px; font-size: 14.5px; color: #a5432f; letter-spacing: -0.01em;
  }
  .compare-note b { color: var(--brand); }

  footer {
    text-align: center; padding: 48px 20px 64px;
    color: var(--muted); font-size: 13px;
    border-top: 1px solid var(--line);
  }

  @media (max-width: 768px) {
    .meta-row { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

  <div class="topbar">
    <div class="brand-mark">我的食谱<span class="dot">.</span></div>
    <div class="text-link">新增菜谱</div>
  </div>

  <div class="compare-note">
    <div class="box">
      这是<b>苹果融合风</b>样板：苹果官网式的大留白、超大紧字距标题、系统字体、无边框卡片、极淡阴影 + 保留番茄红暖色点缀。数据为示例，正式应用会保留全部现有功能。
    </div>
  </div>

  <section class="hero">
    <div class="hero-inner">
      <div class="hero-kicker" data-reveal>Today's Kitchen</div>
      <h1 class="d1" data-reveal>今天，<br>想吃点什么？</h1>
      <p class="d2" data-reveal>收藏家常菜、朋友的拿手菜和视频里的灵感。不知道吃什么时，从这里挑一道。</p>
      <div class="hero-actions d3" data-reveal>
        <button class="btn btn-primary">AI 生成菜谱</button>
        <span class="text-link">手动新增菜谱</span>
      </div>
    </div>
  </section>

  <section class="section on-white">
    <div class="section-inner">
      <div class="section-head">
        <h2 data-reveal>五个世界的味道</h2>
        <p class="d1" data-reveal>从热气腾腾的家常菜，到只存在于动漫和幻想里的奇想料理。</p>
      </div>
      <div class="tabs" data-reveal>
        <div class="tab active">全部</div>
        <div class="tab">现实中的饭</div>
        <div class="tab">二次元中的饭</div>
        <div class="tab">黑暗料理</div>
        <div class="tab">存在于幻想中的饭</div>
        <div class="tab">外国菜</div>
      </div>
      <div class="grid" id="grid"></div>
    </div>
  </section>

  <div class="modal" id="modal">
    <div class="modal-bar"><button class="back-btn" id="back">‹ 返回</button></div>
    <div class="modal-hero" id="modalHero"><i></i></div>
    <div class="modal-content" id="modalContent"></div>
  </div>

  <footer>苹果融合风样板预览 · 数据为示例 · 正式应用后会保留全部现有功能</footer>

<script>
  const RECIPES = [
    { name: "番茄炒蛋", world: "现实中的饭", img: "https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?auto=format&fit=crop&w=1200&q=80", desc: "酸甜开胃、做法稳定的家常菜，嫩滑鸡蛋裹着多汁番茄。", time: "约 15 分钟", cost: "约 12 元", occ: "工作日晚餐", ings: [["番茄","2 个"],["鸡蛋","3 个"],["盐","少许"],["白糖","少许"]], steps: ["鸡蛋打散加少许盐搅匀。","番茄切块，喜欢汤汁多可去皮。","热锅下油，鸡蛋炒到凝固盛出。","番茄炒出汁，加盐和糖调味。","倒回鸡蛋翻炒均匀，撒葱花出锅。"] },
    { name: "黄金蛋包饭", world: "二次元中的饭", img: "https://images.unsplash.com/photo-1567529692333-de9fd6772897?auto=format&fit=crop&w=1200&q=80", desc: "动漫里划开蛋皮、金黄蛋液流淌盖住炒饭的名场面。", time: "约 20 分钟", cost: "约 12 元", occ: "治愈系午餐", ings: [["米饭","1 碗"],["鸡蛋","3 个"],["鸡腿肉","100g"],["番茄酱","2 勺"]], steps: ["鸡肉丁和洋葱炒成番茄鸡肉饭，堆成橄榄形。","鸡蛋加盐打散打匀。","小火化黄油，倒蛋液搅动至半熟滑嫩。","趁流动时离火，整块盖在炒饭上。","上桌划开，让金黄蛋液流淌包住饭。"] },
    { name: "可乐泡面", world: "黑暗料理", img: "https://images.unsplash.com/photo-1569718212165-3a8278d5f624?auto=format&fit=crop&w=1200&q=80", desc: "用可乐代替水煮泡面的传说级操作，慎试，纯属娱乐挑战。", time: "约 8 分钟", cost: "约 7 元", occ: "宵夜 / 猎奇", ings: [["方便面","1 包"],["可乐","1 罐"],["鸡蛋","1 个"]], steps: ["可乐倒进锅里加热（小心起泡）。","可乐微沸后下方便面。","打入一个鸡蛋试图中和甜味。","煮软加调料包，鼓起勇气尝一口。"] },
    { name: "精灵行路面包", world: "存在于幻想中的饭", img: "https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&w=1200&q=80", desc: "《指环王》里精灵的干粮 Lembas，还原成蜂蜜燕麦能量块。", time: "约 35 分钟", cost: "约 18 元", occ: "户外能量补给", ings: [["燕麦","200g"],["面粉","100g"],["蜂蜜","3 勺"],["坚果碎","1 把"]], steps: ["黄油软化和蜂蜜拌匀。","加燕麦、面粉、坚果碎拌成面团。","压成方块，表面划十字。","180 度烤 20 分钟至金黄。","晾凉用叶子或油纸包好。"] },
    { name: "汤姆柯林斯", world: "外国菜", img: "https://images.unsplash.com/photo-1551024709-8f23befc6f87?auto=format&fit=crop&w=1200&q=80", desc: "经典夏日高球鸡尾酒，金酒、柠檬、糖浆和苏打水调成。", time: "约 5 分钟", cost: "—", occ: "饮品", ings: [["金酒","60ml"],["柠檬汁","30ml"],["糖浆","7ml"],["苏打水","适量"]], steps: ["柯林斯杯装满冰块。","加金酒、柠檬汁和糖浆。","搅拌均匀。","苏打水填满，樱桃柠檬片装饰。"] },
    { name: "糖醋里脊", world: "现实中的饭", img: "https://images.unsplash.com/photo-1625938145312-c88c1373e75f?auto=format&fit=crop&w=1200&q=80", desc: "外酥里嫩、酸甜挂汁的经典宴客菜，孩子最爱。", time: "约 25 分钟", cost: "约 25 元", occ: "宴客菜", ings: [["猪里脊","300g"],["淀粉","适量"],["番茄酱","3 勺"],["白醋","2 勺"]], steps: ["里脊切条，加盐腌制。","裹淀粉糊，下油锅炸至金黄。","复炸一次更酥脆。","调糖醋汁下锅熬稠。","倒入里脊快速翻裹出锅。"] }
  ];

  const grid = document.getElementById("grid");
  RECIPES.forEach((r, idx) => {
    const card = document.createElement("div");
    card.className = "card";
    card.setAttribute("data-reveal", "");
    card.style.transitionDelay = (idx % 3) * 0.08 + "s"; // 同排卡片错落进场
    card.innerHTML = `
      <div class="card-img"><i style="background-image:url('${r.img}')"></i><span class="card-badge">${r.world}</span></div>
      <div class="card-body">
        <div class="card-title">${r.name}</div>
        <div class="card-desc">${r.desc}</div>
        <div class="card-meta"><span class="chip">⏱ ${r.time}</span><span class="chip leaf">${r.occ}</span></div>
      </div>`;
    card.addEventListener("click", () => openModal(r));
    grid.appendChild(card);
  });

  const modal = document.getElementById("modal");
  function openModal(r) {
    document.querySelector("#modalHero i").style.backgroundImage = `url('${r.img}')`;
    document.getElementById("modalContent").innerHTML = `
      <h1>${r.name}</h1>
      <p class="lead">${r.desc}</p>
      <div class="meta-row">
        <div class="meta-box"><span>耗时</span><strong>${r.time}</strong></div>
        <div class="meta-box"><span>成本</span><strong>${r.cost}</strong></div>
        <div class="meta-box"><span>场景</span><strong>${r.occ}</strong></div>
        <div class="meta-box"><span>所属</span><strong>${r.world}</strong></div>
      </div>
      <div class="block-title">食材清单</div>
      <div class="ing-list">${r.ings.map(([n,a]) => `<div class="ing-item"><span>${n}</span><span class="amt">${a}</span></div>`).join("")}</div>
      <div class="block-title">做法步骤</div>
      <div class="steps">${r.steps.map((s) => `<div class="step"><span class="num">·</span><p>${s}</p></div>`).join("")}</div>`;
    modal.querySelectorAll(".step .num").forEach((n, i) => n.textContent = i + 1);
    modal.classList.add("open");
    modal.scrollTop = 0;
    document.body.style.overflow = "hidden";
    const steps = modal.querySelectorAll(".step");
    steps.forEach((s, i) => { s.style.transitionDelay = (0.12 + i * 0.09) + "s"; requestAnimationFrame(() => s.classList.add("in")); });
  }
  function closeModal() { modal.classList.remove("open"); document.body.style.overflow = ""; }
  document.getElementById("back").addEventListener("click", closeModal);
  document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });

  document.querySelectorAll(".tab").forEach((t) => {
    t.addEventListener("click", () => { document.querySelector(".tab.active").classList.remove("active"); t.classList.add("active"); });
  });

  /* ===== 苹果式滚动动画 ===== */
  const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  if (!reduceMotion) {
    /* 进场：元素进入视口触发一次淡入上移 */
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) { e.target.classList.add("revealed"); io.unobserve(e.target); }
      });
    }, { threshold: 0.12, rootMargin: "0px 0px -8% 0px" });
    document.querySelectorAll("[data-reveal]").forEach((el) => io.observe(el));

    /* hero 视差：随滚动位移 + 淡出（苹果首屏那种） */
    const heroInner = document.querySelector(".hero-inner");
    let ticking = false;
    function onScroll() { if (!ticking) { requestAnimationFrame(update); ticking = true; } }
    function update() {
      ticking = false;
      const y = window.scrollY;
      const vh = window.innerHeight;
      if (y < vh && heroInner) {
        const p = y / vh;
        heroInner.style.transform = `translateY(${y * 0.28}px)`;
        heroInner.style.opacity = String(Math.max(0, 1 - p * 1.3));
      }
    }
    window.addEventListener("scroll", onScroll, { passive: true });
    update();
  } else {
    /* 降级：全部直接显示 */
    document.querySelectorAll("[data-reveal]").forEach((el) => el.classList.add("revealed"));
  }
</script>
</body>
</html>
